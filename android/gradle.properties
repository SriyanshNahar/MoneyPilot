org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# Works around a Windows-only Kotlin "Build Tools API" incremental-cache
# file-locking failure ("Could not close incremental caches ...") seen
# building plugin modules (url_launcher_android, share_plus, image_picker_android,
# shared_preferences_android) under this project's path. Safe: only disables
# incremental Kotlin compilation, not correctness.
kotlin.incremental=false
# This newDsl flag was added by the Flutter template
android.newDsl=false
# This builtInKotlin flag was added by the Flutter template
android.builtInKotlin=false
