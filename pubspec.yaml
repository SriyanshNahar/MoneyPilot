name: moneypilot
description: "MoneyPilot — Personal finance for India: expenses, EMIs, SIPs and bill reminders."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  material_symbols_icons: ^4.2815.0

  # State management + routing
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1

  # Backend
  supabase_flutter: ^2.9.1

  # Local storage
  shared_preferences: ^2.3.5
  flutter_secure_storage: ^9.2.4

  # Auth / security
  local_auth: ^2.3.0
  sign_in_with_apple: ^6.1.4

  # Media
  image_picker: ^1.1.2

  # Payments
  razorpay_flutter: ^1.4.0

  # Push + local notifications
  firebase_core: ^3.10.0
  firebase_messaging: ^15.2.0
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.1

  # Offline cache
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  connectivity_plus: ^6.1.1

  # Utils
  intl: ^0.20.2
  crypto: ^3.0.6
  http: ^1.2.2
  url_launcher: ^6.3.1
  path_provider: ^2.1.5
  share_plus: ^10.1.4
  package_info_plus: ^8.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 23
  remove_alpha_ios: true

flutter_native_splash:
  # Deliberately no `image:` here. This is the native OS launch screen that
  # shows for a few frames before Flutter/Dart takes over — with a logo it
  # doubled up as a second, jarring splash right before our own animated
  # SplashScreen (lib/features/auth/splash_screen.dart). Solid color only
  # (matching splash_screen.dart's background) makes the handoff invisible:
  # the user only ever sees ONE splash, the custom MoneyPilot one.
  color: "#F4F6F2"
  android_12:
    color: "#F4F6F2"
